<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>еҚ”дҪңзҷҪжқҝ вҖ” еҘҪеӯёз”ҹзӯҶиЁҳ Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="board.css">
</head>
<body>

  <!-- й ӮйғЁе·Ҙе…·еҲ— -->
  <div class="topbar">
    <span class="brand">еҘҪеӯёз”ҹзӯҶиЁҳ В· зҷҪжқҝ</span>
    <span class="room" id="roomLabel">вҖ”</span>
    <div class="divider"></div>

    <div class="toolgroup">
      <button class="tool active" id="toolSelect" title="йҒёеҸ– / з§»еӢ•">вҶ– йҒёеҸ–</button>
      <button class="tool" id="toolNote" title="ж–°еўһдҫҝеҲ©иІј">в–Ұ дҫҝеҲ©иІј</button>
      <button class="tool" id="toolDraw" title="иҮӘз”ұз•«зӯҶ">вңҺ з•«зӯҶ</button>
      <button class="tool" id="toolRect" title="ж–№жЎҶ">в–ў жЎҶ</button>
      <button class="tool" id="toolDelete" title="еҲӘйҷӨйҒёеҸ– (Delete)">рҹ—‘</button>
    </div>

    <div class="divider"></div>
    <div class="swatches" id="swatches"></div>

    <div class="divider"></div>
    <div class="toolgroup">
      <button class="tool primary" id="toolCapture" title="ж“·еҸ–жҲ‘зҡ„з•«йқўдёҰиІјдёҠ">вӣ¶ ж“·еҸ–з•«йқў</button>
      <button class="tool" id="toolUpload" title="дёҠеӮіең–зүҮ">в¬Ҷ дёҠеӮі</button>
    </div>

    <span class="spacer"></span>
    <div class="presence" id="presence"></div>
    <span class="pcount" id="pcount"></span>
  </div>

  <!-- з•«еёғиҲһеҸ° -->
  <div class="stage" id="stage">
    <canvas id="board"></canvas>
    <div class="cursors" id="cursors"></div>
  </div>

  <div class="hint" id="hint">жҲӘең–е°Ҹж’ҮжӯҘ:з”Ёзі»зөұжҲӘең–еҲ°еүӘиІјз°ҝ(Mac вҢҳвҮ§вҢғ4 / Win вҠһвҮ§S)еҫҢ,зӣҙжҺҘеңЁйҖҷиЈЎжҢү вҢҳV / Ctrl+V иІјдёҠ;жҲ–жӢ–жӣіең–зүҮйҖІдҫҶгҖӮ</div>
  <div class="toast" id="toast"></div>
  <input type="file" id="fileInput" accept="image/*" multiple hidden>

  <!-- зҷ»е…Ҙ modal -->
  <div class="overlay" id="overlay">
    <div class="card">
      <div class="eyebrow">Collaborative Whiteboard</div>
      <h1 id="loginTitle">йҖІе…ҘзҷҪжқҝ</h1>
      <p>ијёе…ҘдёҖеҖӢжҡұзЁұ,е°ұиғҪе’ҢеӨ§е®¶дёҖиө·еңЁйҖҷйқўзҷҪжқҝдёҠеҚіжҷӮеҚ”дҪңгҖӮ</p>
      <input type="text" id="nickInput" maxlength="16" placeholder="дҪ зҡ„жҡұзЁұ" autocomplete="off">
      <div class="colorpick" id="colorPick"></div>
      <button class="enter" id="enterBtn">йҖІе…ҘзҷҪжқҝ вҶ’</button>
      <div class="status" id="loginStatus"></div>
    </div>
  </div>

  <!-- Fabric.js (йҮҳзүҲжң¬,UMD е…Ёеҹҹ window.fabric) -->
  <script src="https://cdn.jsdelivr.net/npm/fabric@6.7.1/dist/index.min.js"></script>
  <!-- Firebase v9 compat(е‘ҪеҗҚз©әй–“ API) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="board.js"></script>
</body>
</html>
